<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>67 Kafalar</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e10; color: #f2f2f4; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 22px 28px 10px; display: flex; align-items: baseline; gap: 14px; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.2px; }
  header span { font-size: 13px; color: #8e8e93; }
  .bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 28px 14px; }
  .bar button { background: #1c1c1f; color: #d5d5da; border: 1px solid #2a2a2e; border-radius: 999px; padding: 7px 16px; font-size: 13px; cursor: pointer; transition: all .15s; }
  .bar button:hover { background: #26262b; }
  .bar button.act { background: #f2f2f4; color: #111; border-color: #f2f2f4; font-weight: 600; }
  model-viewer { flex: 1; width: 100%; min-height: 62vh; background: #0e0e10; }
  footer { padding: 12px 28px 20px; font-size: 12px; color: #6e6e73; }
</style>
</head>
<body>
<header><h1>67 Kafalar</h1><span>13 model — surukle, dondur, yakinlas</span></header>
<div class="bar" id="bar"></div>
<model-viewer id="mv" src="models/kafa-1.glb" camera-controls auto-rotate auto-rotate-delay="1500" rotation-per-second="18deg" shadow-intensity="0.6" exposure="1.05" camera-orbit="0deg 82deg 105%" min-camera-orbit="auto auto 40%" interaction-prompt="none"></model-viewer>
<footer>67 — ozel guclu kafalar. Elektrik mavisi goz serisi.</footer>
<script>
const heads = ["1","A","B","C","D","E","F","G","H","I","D2","E2","F2"];
const bar = document.getElementById("bar");
const mv = document.getElementById("mv");
heads.forEach((h, i) => {
  const b = document.createElement("button");
  b.textContent = "KAFA " + h;
  if (i === 0) b.classList.add("act");
  b.onclick = () => {
    mv.src = "models/kafa-" + h + ".glb";
    document.querySelectorAll(".bar button").forEach(x => x.classList.remove("act"));
    b.classList.add("act");
  };
  bar.appendChild(b);
});
</script>
</body>
</html>
